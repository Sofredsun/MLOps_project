apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: school-rag
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/bitterrch/mlops_project
    targetRevision: main
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: school-rag

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

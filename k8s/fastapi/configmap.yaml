  MLFLOW_MODEL_ALIAS: "production"
  MLFLOW_AUTO_REGISTER_ON_STARTUP: "1"
  DEFAULT_LLM_MODEL: "qwen2.5:7b"
  DEFAULT_K_RETRIEVAL: "8"

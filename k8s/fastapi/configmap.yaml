apiVersion: v1
kind: ConfigMap
metadata:
  name: school-rag-api-config
  namespace: school-rag
  labels:
    app: school-rag-api
data:
  OLLAMA_BASE_URL: "http://ollama:11434"
  MLFLOW_TRACKING_URI: "http://mlflow:5000"
  MLFLOW_EXPERIMENT_NAME: "School_RAG_System"
  MLFLOW_DISABLED: "0"

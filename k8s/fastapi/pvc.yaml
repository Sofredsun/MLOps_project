apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: school-rag-api-data
  namespace: school-rag
  labels:
    app: school-rag-api
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: school-rag-chroma
  namespace: school-rag
  labels:
    app: school-rag-api
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

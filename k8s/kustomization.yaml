apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: school-rag

resources:
  - namespace.yaml
  - mlflow/deployment.yaml
  - ollama/deployment.yaml
  - fastapi/pvc.yaml
  - fastapi/configmap.yaml
  - fastapi/secret.yaml
  - fastapi/deployment.yaml
  - fastapi/service.yaml
  - streamlit/deployment.yaml
  - streamlit/service.yaml
  - monitoring/prometheus.yaml
  - monitoring/grafana.yaml

configMapGenerator:
  - name: prometheus-config
    files:
      - prometheus.yml=monitoring/prometheus-config.yml
  - name: grafana-datasources
    files:
      - prometheus.yml=monitoring/grafana/provisioning/datasources/prometheus.yml
  - name: grafana-dashboard-provider
    files:
      - dashboards.yml=monitoring/grafana/provisioning/dashboards/dashboards.yml
  - name: grafana-dashboards
    files:
      - monitoring/grafana/dashboards/rag-api-metrics.json
      - monitoring/grafana/dashboards/rag-api-overview.json

commonLabels:
  app.kubernetes.io/part-of: school-rag

name: CI

on:
  push:
    branches: [feat/CI-CD, main]  
  pull_request:
    branches: [develop, main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting tools
        run: pip install flake8 black isort

      - name: Check formatting with black
        run: black --check src/ api.py app.py

      - name: Check imports with isort
        run: isort --check-only --profile black src/ api.py app.py

      - name: Lint with flake8
        run: flake8 src/ api.py app.py --max-line-length=88 --extend-ignore=E203,E402

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt flake8 black isort pytest pytest-cov

      - name: Run tests with coverage
        run: python -m pytest tests/ -v --tb=short --cov=src --cov-report=term-missing --cov-report=xml
        env:
          PYTHONPATH: .

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7
      
  build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    outputs:
      # Для передачи одного тега в деплой
      sha-tag: ${{ steps.sha-tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute SHA tag
        id: sha-tag
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "tag=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to k8s (kind)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: school-rag-cluster

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image from GHCR
        run: docker pull ${{ needs.build.outputs.sha-tag }}
 
      - name: Load image into kind
        run: |
          kind load docker-image ${{ needs.build.outputs.sha-tag }} \
            --name school-rag-cluster
 
      - name: Patch kustomization for kind
        run: |
          cd k8s
          cat > kustomization.yaml << 'KUSTOMIZE'
          apiVersion: kustomize.config.k8s.io/v1beta1
          kind: Kustomization
          namespace: school-rag
          resources:
            - namespace.yaml
            - fastapi/configmap.yaml
            - fastapi/secret.yaml
            - fastapi/pvc.yaml
            - fastapi/deployment.yaml
            - fastapi/service.yaml
          commonLabels:
            app.kubernetes.io/part-of: school-rag
          KUSTOMIZE
          kustomize edit set image mlops-fastapi=${{ needs.build.outputs.sha-tag }}
 
      - name: Apply manifests
        run: kubectl apply -k k8s/
 
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/school-rag-api \
            -n school-rag \
            --timeout=300s
 
      - name: Debug pod status
        if: failure()
        run: |
          kubectl get pods -n school-rag
          kubectl logs -l app=school-rag-api -n school-rag --tail=50 || true
          kubectl describe pod -l app=school-rag-api -n school-rag      